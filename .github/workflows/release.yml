name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Http/Frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: Http/Frontend

      - name: Build frontend
        run: npm run build
        working-directory: Http/Frontend

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Download Dalamud
        run: |
          wget -q https://goatcorp.github.io/dalamud-distrib/latest.zip -O dalamud.zip
          unzip -q dalamud.zip -d ~/dalamud

      - name: Update websiteBuild.zip
        run: |
          cd Http/Frontend && zip -r ../../websiteBuild.zip dist/ && cd ../..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git pull origin main
          git add websiteBuild.zip
          git diff --cached --quiet || git commit -m "chore: update websiteBuild.zip" && git push origin main

      - name: Build
        run: dotnet build -c Release -p:DalamudLibPath=$HOME/dalamud -p:IsPlogonBuild=True

      - name: Create release artifact
        if: startsWith(github.ref, 'refs/tags/')
        run: cd bin/Release && zip -r ../../ChatAnywhere.zip .

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ChatAnywhere.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update DalamudPlugins repo
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git clone https://x-access-token:${{ secrets.PLUGINS_REPO_TOKEN }}@github.com/twelvehouse/DalamudPlugins.git dalamud-plugins
          mkdir -p dalamud-plugins/plugins/ChatAnywhere
          cp ChatAnywhere.zip dalamud-plugins/plugins/ChatAnywhere/latest.zip
          cd dalamud-plugins
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/ChatAnywhere/latest.zip
          git diff --cached --quiet || git commit -m "chore: update ChatAnywhere ${{ github.ref_name }}" && git push
