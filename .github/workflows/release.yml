name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Http/Frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: Http/Frontend

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Download Dalamud
        run: |
          wget -q https://goatcorp.github.io/dalamud-distrib/latest.zip -O dalamud.zip
          unzip -q dalamud.zip -d ~/dalamud

      - name: Build
        run: dotnet build -c Release -p:DalamudLibPath=$HOME/dalamud

      - name: Create release artifact
        run: cd bin/Release && zip -r ../../ChatAnywhere.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ChatAnywhere.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update pluginmaster.json
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          IFS='.' read -ra P <<< "$VERSION"
          while [ ${#P[@]} -lt 4 ]; do P+=("0"); done
          ASSEMBLY_VERSION="${P[0]}.${P[1]}.${P[2]}.${P[3]}"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/$TAG/ChatAnywhere.zip"
          jq --arg v "$ASSEMBLY_VERSION" --arg u "$DOWNLOAD_URL" --arg t "$(date +%s)" \
            '.[0].AssemblyVersion = $v | .[0].DownloadLinkInstall = $u | .[0].DownloadLinkUpdate = $u | .[0].LastUpdate = $t' \
            pluginmaster.json > tmp.json && mv tmp.json pluginmaster.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pluginmaster.json
          git diff --cached --quiet || git commit -m "chore: update pluginmaster.json for $TAG" && git push origin HEAD:refs/heads/main
